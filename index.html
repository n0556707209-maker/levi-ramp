<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>יומן</title>
<!-- פתיחה כאפליקציה ממסך הבית באייפון -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RIVKA">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon.png">
<link rel="icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3A2B31;
  --ink-soft:#8B7A80;
  --ink-faint:#BFAFB4;
  --rose:#D9899F;
  --rose-deep:#B9647C;
  --rose-tint:#FBEFF3;
  --rose-line:#F2DCE3;
  --sage:#7FA98D;
  --amber:#C99A5B;
  --paper:#FFFFFF;
  --paper-warm:#FDFAFB;
  --r-lg:22px;
  --r-md:16px;
  --r-sm:11px;
  --shadow:0 2px 14px rgba(184,110,133,.09);
  --shadow-up:0 -3px 20px rgba(184,110,133,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:'Assistant',system-ui,sans-serif;
  background:var(--paper-warm);color:var(--ink);
  font-size:16px;line-height:1.5;overscroll-behavior-y:none;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{border:none;background:none;cursor:pointer;padding:0}

#app{max-width:440px;margin:0 auto;background:var(--paper);min-height:100vh;
  display:flex;flex-direction:column;box-shadow:0 0 60px rgba(184,110,133,.07);position:relative}

/* ---------- header ---------- */
.hdr{padding:26px 22px 12px;flex-shrink:0;display:flex;align-items:center;gap:14px}
.hdr-txt{flex:1;min-width:0}
.logo{width:52px;height:52px;border-radius:16px;object-fit:cover;flex-shrink:0;display:none;
  box-shadow:0 3px 12px rgba(184,110,133,.22)}
.logo.on{display:block;animation:fade .4s ease both}
.hdr .eyebrow{font-size:12.5px;letter-spacing:.09em;color:var(--rose);font-weight:600;text-transform:none}
.hdr h1{font-family:'Heebo';font-weight:800;font-size:27px;margin:3px 0 0;letter-spacing:-.02em}
.hdr .sub{color:var(--ink-soft);font-size:14.5px;margin-top:2px}

/* ---------- scroll area ---------- */
main{flex:1;overflow-y:auto;padding:0 18px 120px;-webkit-overflow-scrolling:touch}
.screen{display:none;animation:fade .28s ease both}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ---------- cards ---------- */
.card{background:var(--paper);border:1px solid var(--rose-line);border-radius:var(--r-lg);
  padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card.flat{box-shadow:none}
.tintcard{background:var(--rose-tint);border:none;border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px}

/* ---------- banner ---------- */
.banner{display:flex;align-items:center;gap:12px;background:linear-gradient(115deg,var(--rose) 0%,#E5A3B4 100%);
  color:#fff;border-radius:var(--r-lg);padding:15px 18px;margin-bottom:16px;box-shadow:0 6px 18px rgba(217,137,159,.32);
  animation:pulseIn .5s ease both}
@keyframes pulseIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.banner .txt{flex:1}
.banner b{display:block;font-family:'Heebo';font-weight:700;font-size:16.5px}
.banner span{font-size:13.5px;opacity:.9}
.banner .go{background:rgba(255,255,255,.22);border-radius:999px;padding:8px 15px;font-weight:700;font-size:14px;color:#fff}

/* ---------- day rail (signature) ---------- */
.rail{position:relative;padding-right:62px;margin-top:6px}
.rail:before{content:'';position:absolute;right:20px;top:8px;bottom:8px;width:2px;
  background:linear-gradient(var(--rose-line),var(--rose-line) 60%,transparent)}
.slot{position:relative;margin-bottom:11px}
.slot .time{position:absolute;right:-62px;top:15px;width:44px;text-align:center;
  font-family:'Heebo';font-weight:700;font-size:14.5px;color:var(--ink-soft);letter-spacing:-.01em}
.slot .dot{position:absolute;right:-46px;top:20px;width:11px;height:11px;border-radius:50%;
  background:#fff;border:2.5px solid var(--rose);z-index:2}
.slot.done .dot{background:var(--sage);border-color:var(--sage)}
.slot.cancelled .dot{background:var(--ink-faint);border-color:var(--ink-faint)}
.slot.done .apt,.slot.cancelled .apt{opacity:.5}
.slot.done .apt .nm{text-decoration:line-through}
.apt{background:var(--paper);border:1px solid var(--rose-line);border-radius:var(--r-md);
  padding:13px 15px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;
  transition:transform .18s ease}
.apt:active{transform:scale(.985)}
.apt .body{flex:1;min-width:0}
.apt .nm{font-family:'Heebo';font-weight:700;font-size:16.5px;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apt .meta{font-size:13.5px;color:var(--ink-soft);margin-top:1px}
.apt .price{font-family:'Heebo';font-weight:700;font-size:14.5px;color:var(--rose-deep);white-space:nowrap}
.nowline{position:relative;height:0;margin:2px 0 13px}
.nowline:before{content:'';position:absolute;right:-46px;left:0;top:0;border-top:1.5px dashed var(--rose)}
.nowline:after{content:'עכשיו';position:absolute;right:-62px;top:-10px;font-size:11px;font-weight:700;
  color:var(--rose);background:#fff;padding:1px 4px;border-radius:5px}

/* ---------- quick grid ---------- */
.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.qbtn{background:var(--rose-tint);border-radius:var(--r-md);padding:15px 14px;text-align:right;
  font-weight:600;font-size:15px;display:flex;align-items:center;gap:9px;transition:transform .15s}
.qbtn:active{transform:scale(.97)}
.qbtn i{font-style:normal;font-size:19px}

/* ---------- stats ---------- */
.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--rose-tint);border-radius:var(--r-md);padding:12px 10px;text-align:center}
.stat b{display:block;font-family:'Heebo';font-weight:800;font-size:23px;letter-spacing:-.03em;color:var(--rose-deep)}
.stat span{font-size:12.5px;color:var(--ink-soft)}

/* ---------- forms ---------- */
label.fld{display:block;margin-bottom:13px}
label.fld .lb{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;padding-right:3px}
.in{width:100%;background:var(--paper-warm);border:1.5px solid var(--rose-line);border-radius:var(--r-sm);
  padding:12px 13px;outline:none;transition:border-color .16s,background .16s}
.in:focus{border-color:var(--rose);background:#fff}
textarea.in{min-height:72px;resize:vertical}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1.5px solid var(--rose-line);background:#fff;border-radius:999px;padding:8px 14px;
  font-size:14.5px;font-weight:600;transition:all .16s}
.chip.on{background:var(--rose);border-color:var(--rose);color:#fff;box-shadow:0 3px 10px rgba(217,137,159,.3)}
.chip.add{border-style:dashed;color:var(--ink-soft)}

.btn{display:block;width:100%;background:var(--rose);color:#fff;border-radius:var(--r-md);
  padding:15px;font-family:'Heebo';font-weight:700;font-size:17px;text-align:center;
  box-shadow:0 5px 16px rgba(217,137,159,.34);transition:transform .15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:#fff;color:var(--rose-deep);border:1.5px solid var(--rose-line);box-shadow:none}
.btn.wa{background:#25D366;box-shadow:0 5px 16px rgba(37,211,102,.3)}
.btn.sm{padding:11px;font-size:15px}
.btn.danger{background:#fff;color:#C0576B;border:1.5px solid #F2D6DC;box-shadow:none}

/* ---------- list rows ---------- */
.row{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--rose-line)}
.row:last-child{border-bottom:none}
.av{width:42px;height:42px;border-radius:50%;background:var(--rose-tint);color:var(--rose-deep);
  display:flex;align-items:center;justify-content:center;font-family:'Heebo';font-weight:700;font-size:16px;flex-shrink:0}
.row .body{flex:1;min-width:0}
.row .t1{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .t2{font-size:13.5px;color:var(--ink-soft)}
.row .arrow{color:var(--ink-faint);font-size:18px}

/* ---------- calendar ---------- */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calhead b{font-family:'Heebo';font-weight:700;font-size:18px}
.calnav{width:36px;height:36px;border-radius:50%;background:var(--rose-tint);color:var(--rose-deep);font-size:17px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.gname{text-align:center;font-size:11.5px;color:var(--ink-faint);font-weight:600;padding-bottom:5px}
.day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;font-size:14.5px;font-weight:600;position:relative;transition:background .15s}
.day.out{color:var(--ink-faint);opacity:.45}
.day.today{color:var(--rose-deep);font-weight:800}
.day.sel{background:var(--rose);color:#fff;box-shadow:0 4px 12px rgba(217,137,159,.35)}
.day .pips{position:absolute;bottom:6px;display:flex;gap:2px}
.day .pips i{width:4px;height:4px;border-radius:50%;background:var(--rose);display:block}
.day.sel .pips i{background:#fff}

/* ---------- sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(58,43,49,.34);opacity:0;pointer-events:none;
  transition:opacity .26s;z-index:60;backdrop-filter:blur(2px)}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:440px;margin:0 auto;background:#fff;
  border-radius:26px 26px 0 0;padding:10px 20px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(101%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:61;
  max-height:88vh;overflow-y:auto}
.sheet.on{transform:none}
.grab{width:38px;height:4px;border-radius:99px;background:var(--rose-line);margin:6px auto 14px}
.sheet h3{font-family:'Heebo';font-weight:800;font-size:21px;margin:0 0 3px;letter-spacing:-.02em}
.sheet .sub{color:var(--ink-soft);font-size:14.5px;margin:0 0 16px}

/* ---------- bottom nav ---------- */
nav{position:fixed;bottom:0;left:0;right:0;max-width:440px;margin:0 auto;background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);border-top:1px solid var(--rose-line);box-shadow:var(--shadow-up);
  display:flex;padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:40}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-faint);
  font-size:10.5px;font-weight:600;transition:color .18s;padding:3px 0}
nav button.on{color:var(--rose-deep)}
nav button i{font-style:normal;font-size:21px;line-height:1;transition:transform .2s}
nav button.on i{transform:translateY(-1px) scale(1.06)}
nav .fab{flex:0 0 auto;width:56px}
nav .fab i{width:50px;height:50px;border-radius:50%;background:var(--rose);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:300;
  box-shadow:0 6px 18px rgba(217,137,159,.42);margin-top:-19px}
nav .fab:active i{transform:scale(.93)}

/* ---------- misc ---------- */
.empty{text-align:center;padding:52px 24px;color:var(--ink-soft)}
.empty .ic{font-size:38px;margin-bottom:10px;opacity:.6}
.empty b{display:block;font-family:'Heebo';font-weight:700;font-size:17px;color:var(--ink);margin-bottom:4px}
.sect{font-size:12.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em;margin:20px 4px 8px}
.pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
.pill.done{background:#E9F3EC;color:#4E7E5F}
.pill.cancelled{background:#F1EDEE;color:#8B7A80}
.pill.noshow{background:#FBEDE2;color:#A9763A}
.pill.scheduled{background:var(--rose-tint);color:var(--rose-deep)}
.toast{position:fixed;bottom:96px;left:50%;transform:translate(-50%,16px);background:var(--ink);color:#fff;
  padding:11px 20px;border-radius:999px;font-size:14.5px;font-weight:600;opacity:0;pointer-events:none;
  transition:all .28s;z-index:80;white-space:nowrap}
.toast.on{opacity:1;transform:translate(-50%,0)}
.warn{background:#FFF6E9;border:1px solid #F0DDBD;color:#8A6427;border-radius:var(--r-sm);
  padding:10px 13px;font-size:14px;margin-bottom:12px}
.linkrow{display:flex;justify-content:space-between;align-items:center;padding:14px 2px;
  border-bottom:1px solid var(--rose-line);font-weight:600}
.linkrow:last-child{border-bottom:none}
.linkrow .val{color:var(--ink-soft);font-weight:400;font-size:14.5px}
.sw{width:48px;height:28px;border-radius:99px;background:var(--rose-line);position:relative;transition:background .2s;flex-shrink:0}
.sw:after{content:'';position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:transform .22s}
.sw.on{background:var(--rose)}
.sw.on:after{transform:translateX(-20px)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-txt">
      <div class="eyebrow" id="hEye"></div>
      <h1 id="hTitle"></h1>
      <div class="sub" id="hSub"></div>
    </div>
    <img id="hLogo" class="logo" src="icon.png" alt="">
  </div>

  <main>
    <section class="screen" id="s-home"></section>
    <section class="screen" id="s-cal"></section>
    <section class="screen" id="s-new"></section>
    <section class="screen" id="s-clients"></section>
    <section class="screen" id="s-settings"></section>
    <section class="screen" id="s-reminders"></section>
  </main>

  <nav>
    <button data-go="home" class="on"><i>⌂</i>בית</button>
    <button data-go="cal"><i>▤</i>יומן</button>
    <button data-go="new" class="fab"><i>+</i></button>
    <button data-go="clients"><i>◍</i>לקוחות</button>
    <button data-go="settings"><i>⚙</i>הגדרות</button>
  </nav>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   NAIL STUDIO — שלב 1
   שכבות: state (נתונים) → helpers → render (תצוגה) → actions
   ============================================================ */

const KEY = 'nailstudio:v1';

const DEFAULTS = {
  settings:{
    business:'RIVKA',
    defaultDuration:60,
    reminderWhen:'evening_before',
    buffer:0,
    tplConfirm:'היי {שם} 🌸\nהתור שלך נקבע.\nתאריך: {תאריך}\nשעה: {שעה}\nטיפול: {טיפול}\nמחכה לראות אותך ❤️',
    tplRemind:'היי {שם} 🌸\nתזכורת קטנה — התור שלך {מתי} בשעה {שעה}.\nמחכה לראות אותך ❤️',
    tplUpdate:'היי {שם} 🌸\nהתור שלך עודכן.\nתאריך: {תאריך}\nשעה: {שעה}\nנתראה ❤️',
    notify:true
  },
  treatments:[
    {id:'t1',name:'לק ג׳ל',price:120,dur:60},
    {id:'t2',name:'בנייה בג׳ל',price:250,dur:120},
    {id:'t3',name:'מילוי',price:180,dur:90},
    {id:'t4',name:'מניקור',price:80,dur:45},
    {id:'t5',name:'פדיקור',price:150,dur:60},
    {id:'t6',name:'הסרה',price:50,dur:30}
  ],
  clients:[],
  appointments:[]
};

let S = JSON.parse(JSON.stringify(DEFAULTS));
let view = 'home';
let calMonth = new Date();
let calSel = todayISO();
let draft = null;      // טיוטת תור בעריכה
let clientQuery = '';

/* ---------- אחסון: נשמר על המכשיר עצמו ---------- */
async function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) S = Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), JSON.parse(raw));
  }catch(e){ /* אין נתונים עדיין — מתחילים נקי */ }
}
async function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ toast('השמירה נכשלה — אין מקום פנוי'); }
}

/* ---------- עזרים ---------- */
const uid = () => Math.random().toString(36).slice(2,9);
function todayISO(d){ d = d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAYS_S = ['א','ב','ג','ד','ה','ו','ש'];
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return DAYS[dt.getDay()]+', '+d+' ב'+MONTHS[m-1];
}
function fmtShort(iso){ const [y,m,d]=iso.split('-'); return +d+'.'+ +m; }
function whenWord(iso){
  const t = todayISO();
  if(iso===t) return 'היום';
  const tm = new Date(); tm.setDate(tm.getDate()+1);
  if(iso===todayISO(tm)) return 'מחר';
  return 'ב'+fmtDate(iso).split(', ')[0];
}
function addMin(hhmm, min){
  let [h,m] = hhmm.split(':').map(Number);
  const tot = h*60+m+min;
  return pad(Math.floor(tot/60)%24)+':'+pad(tot%60);
}
function toMin(hhmm){ const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* מספר טלפון ישראלי → פורמט בינלאומי לוואטסאפ */
function waNumber(raw){
  let n = String(raw||'').replace(/[^\d+]/g,'');
  n = n.replace(/^\+/,'');
  if(n.startsWith('972')) return n;
  if(n.startsWith('0')) return '972'+n.slice(1);
  if(n.length===9 && n.startsWith('5')) return '972'+n;
  return n;
}
function fmtPhone(raw){
  const n = String(raw||'').replace(/\D/g,'');
  if(n.length===10 && n.startsWith('0')) return n.slice(0,3)+'-'+n.slice(3);
  return raw||'';
}
function openWA(phone, text){
  const num = waNumber(phone);
  if(!num){ toast('חסר מספר טלפון'); return; }
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(text),'_blank');
}
function fillTpl(tpl, ap){
  const c = getClient(ap.clientId);
  return tpl
    .replace(/{שם}/g, c?c.name:'')
    .replace(/{תאריך}/g, fmtDate(ap.date))
    .replace(/{שעה}/g, ap.time)
    .replace(/{טיפול}/g, ap.treatment||'')
    .replace(/{מחיר}/g, ap.price!=null?ap.price+' ₪':'')
    .replace(/{מתי}/g, whenWord(ap.date));
}

/* ---------- שאילתות על הנתונים ---------- */
const getClient = id => S.clients.find(c=>c.id===id);
const byDate = iso => S.appointments.filter(a=>a.date===iso)
  .sort((a,b)=>toMin(a.time)-toMin(b.time));
function clientHistory(id){
  return S.appointments.filter(a=>a.clientId===id)
    .sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
}
function clientStats(id){
  const h = clientHistory(id);
  const done = h.filter(a=>a.status==='done');
  return {total:done.length, last:done[0]?done[0].date:null, spent:done.reduce((s,a)=>s+(+a.price||0),0)};
}
/* מתי התזכורת אמורה לצאת */
function reminderTime(ap){
  const [y,m,d] = ap.date.split('-').map(Number);
  const dt = new Date(y,m-1,d,...ap.time.split(':').map(Number));
  const w = S.settings.reminderWhen;
  if(w==='evening_before'){ const e=new Date(y,m-1,d-1,19,0); return e; }
  if(w==='morning_of'){ return new Date(y,m-1,d,8,0); }
  return new Date(dt.getTime()-3*3600*1000); // 3 שעות לפני
}
function pendingReminders(){
  const now = new Date();
  return S.appointments.filter(a=>{
    if(a.status!=='scheduled' || a.remindSent) return false;
    const [y,m,d]=a.date.split('-').map(Number);
    const start = new Date(y,m-1,d,...a.time.split(':').map(Number));
    return start > now && reminderTime(a) <= now;
  }).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
}
function conflicts(ap){
  return byDate(ap.date).filter(o=>{
    if(o.id===ap.id || o.status==='cancelled') return false;
    const s1=toMin(ap.time), e1=s1+(+ap.dur||60)+(+S.settings.buffer||0);
    const s2=toMin(o.time), e2=s2+(+o.dur||60)+(+S.settings.buffer||0);
    return s1 < e2 && s2 < e1;
  });
}

const $ = id => document.getElementById(id);

function go(v){
  view = v;
  if(v==='new' && !draft) newDraft();
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.go===v));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $('s-'+v).classList.add('on');
  $('hLogo').classList.toggle('on', v==='home');
  document.querySelector('main').scrollTop = 0;
  render();
}

function render(){
  const map = {home:renderHome, cal:renderCal, new:renderNew, clients:renderClients,
               settings:renderSettings, reminders:renderReminders};
  map[view]();
}

/* ---------- יומן ---------- */
function renderCal(){
  $('hEye').textContent='יומן'; $('hTitle').textContent='התורים שלי'; $('hSub').textContent='';
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const first = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  const prevDim = new Date(y,m,0).getDate();

  let h = `<div class="card flat" style="padding:14px">
    <div class="calhead">
      <button class="calnav" onclick="shiftMonth(-1)">›</button>
      <b>${MONTHS[m]} ${y}</b>
      <button class="calnav" onclick="shiftMonth(1)">‹</button>
    </div><div class="grid">`;
  DAYS_S.forEach(d=>h+=`<div class="gname">${d}</div>`);

  for(let i=first-1;i>=0;i--) h+=`<div class="day out">${prevDim-i}</div>`;
  for(let d=1;d<=dim;d++){
    const iso = y+'-'+pad(m+1)+'-'+pad(d);
    const n = byDate(iso).filter(a=>a.status!=='cancelled').length;
    const cls = ['day', iso===todayISO()?'today':'', iso===calSel?'sel':''].join(' ');
    h += `<div class="${cls}" onclick="selDay('${iso}')">${d}
      ${n?`<div class="pips">${'<i></i>'.repeat(Math.min(n,3))}</div>`:''}</div>`;
  }
  h += `</div></div>`;

  const list = byDate(calSel);
  h += `<div class="sect">${fmtDate(calSel)}</div>`;
  if(!list.length){
    h += `<div class="empty" style="padding:34px"><b>אין תורים ביום הזה</b>
      <button class="btn sm" style="margin-top:14px;max-width:200px;margin-inline:auto" 
        onclick="newDraft('${calSel}');go('new')">קביעת תור</button></div>`;
  }else{
    h += `<div class="rail">` + list.map(slotHTML).join('') + `</div>`;
  }
  $('s-cal').innerHTML = h;
}
function shiftMonth(n){ calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+n, 1); renderCal(); }
function selDay(iso){ calSel = iso; renderCal(); }

    </div></div>`;

    <div class="row2">

        <input class="in" id="f-date" type="date" value="${draft.date}" onchange="syncDraft();renderNew()"></label>

        <input class="in" id="f-time" type="time" value="${draft.time}" onchange="syncDraft();renderNew()"></label>

    const c0 = getClient(conf[0].clientId);
    h += `<div class="warn" style="margin-top:12px">⚠ יש חפיפה עם ${esc(c0?c0.name:'תור קיים')} בשעה ${conf[0].time}</div>`;

  </div>`;

function syncDraft(){
  const g = id => { const el=$(id); return el?el.value:''; };
  draft.name = g('f-name'); draft.phone = g('f-phone');
  draft.price = g('f-price'); draft.dur = +g('f-dur')||60;
  draft.date = g('f-date'); draft.time = g('f-time'); draft.notes = g('f-notes');
}
function pickClient(id){
  syncDraft();
  const c = getClient(id);
  if(draft.clientId===id){ draft.clientId=null; draft.name=''; draft.phone=''; }
  else { draft.clientId=id; draft.name=c.name; draft.phone=c.phone; }
  renderNew();
}
function pickTreat(tid){
  syncDraft();
  const t = S.treatments.find(x=>x.id===tid);
  if(draft.treatment===t.name){ draft.treatment=''; }
  else { draft.treatment=t.name; draft.price=t.price; draft.dur=t.dur; }
  renderNew();
}

async function saveApt(){
  syncDraft();
  if(!draft.name.trim()){ toast('צריך שם לקוחה'); return; }
  if(!draft.treatment){ toast('בחרי טיפול'); return; }

  // לקוחה: קיימת או חדשה
  let cid = draft.clientId;
  if(!cid){
    const exist = S.clients.find(c=>c.phone && waNumber(c.phone)===waNumber(draft.phone) && draft.phone);
    if(exist){ cid = exist.id; }
    else { cid = uid(); S.clients.push({id:cid, name:draft.name.trim(), phone:draft.phone.trim(), notes:''}); }
  }
  const c = getClient(cid);
  c.name = draft.name.trim(); c.phone = draft.phone.trim(); c.lastSeen = draft.date;

  const wasEdit = !!draft.id;
  const ap = {
    id: draft.id||uid(), clientId:cid, treatment:draft.treatment, price:+draft.price||0,
    date:draft.date, time:draft.time, dur:+draft.dur||60, notes:draft.notes,
    status: draft.status||'scheduled',
    confirmSent: wasEdit ? (S.appointments.find(a=>a.id===draft.id)||{}).confirmSent : false,
    remindSent: false
  };
  if(wasEdit) S.appointments = S.appointments.map(a=>a.id===ap.id?ap:a);
  else S.appointments.push(ap);

  await save();
  draft = null;
  calSel = ap.date;
  askSend(ap, wasEdit ? 'update' : 'confirm');
}

async function doSend(id, kind){
  const a = S.appointments.find(x=>x.id===id);
  const tpl = kind==='update' ? S.settings.tplUpdate : S.settings.tplConfirm;
  openWA(getClient(a.clientId).phone, fillTpl(tpl,a));
  a.confirmSent = true; await save();
  closeSheet(); go('home');
}

function openApt(id){
  const a = S.appointments.find(x=>x.id===id);
  const c = getClient(a.clientId);
  const labels = {scheduled:'קבוע', done:'הושלם', cancelled:'בוטל', noshow:'לא הגיעה'};
  sheet(`<h3>${esc(c?c.name:'')}</h3>
    <p class="sub">${fmtDate(a.date)} · ${a.time}–${addMin(a.time,a.dur)}</p>
    <div class="tintcard">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span>${esc(a.treatment)}</span><b>${a.price} ₪</b></div>
      <div style="display:flex;justify-content:space-between;color:var(--ink-soft);font-size:14px">
        <span>${fmtPhone(c?c.phone:'')}</span><span class="pill ${a.status}">${labels[a.status]}</span></div>
      ${a.notes?`<div style="margin-top:10px;font-size:14px;color:var(--ink-soft);white-space:pre-wrap">${esc(a.notes)}</div>`:''}
    </div>
    ${a.status==='scheduled'?`
      <button class="btn wa sm" onclick="quickWA('${a.id}')">הודעה בוואטסאפ</button>
      <div class="row2" style="margin-top:9px">
        <button class="btn ghost sm" onclick="setStatus('${a.id}','done')">✓ הושלם</button>
        <button class="btn ghost sm" onclick="setStatus('${a.id}','noshow')">לא הגיעה</button>
      </div>`:`
      <button class="btn ghost sm" onclick="setStatus('${a.id}','scheduled')">החזרה לתור פעיל</button>`}
    ${a.status==='done'?`<button class="btn sm" style="margin-top:9px" onclick="bookNext('${a.id}')">קביעת התור הבא</button>`:''}
    ${a.status==='scheduled'?`<button class="btn ghost sm" style="margin-top:9px" onclick="toCalendar('${a.id}')">הוספה ליומן הטלפון ⏰</button>`:''}
    <div class="row2" style="margin-top:9px">
      <button class="btn ghost sm" onclick="editApt('${a.id}')">עריכה</button>
      <button class="btn ghost sm" onclick="dupApt('${a.id}')">שכפול</button>
    </div>
    <button class="btn danger sm" style="margin-top:9px" onclick="delApt('${a.id}')">מחיקת התור</button>`);
}
function quickWA(id){
  const a = S.appointments.find(x=>x.id===id);
  openWA(getClient(a.clientId).phone, fillTpl(S.settings.tplRemind,a));
}
async function setStatus(id,st){
  const a = S.appointments.find(x=>x.id===id);
  a.status = st; await save(); closeSheet(); render();
  toast(st==='done'?'סומן כהושלם':st==='noshow'?'סומן: לא הגיעה':'הוחזר לתור פעיל');
}
function editApt(id){
  const a = S.appointments.find(x=>x.id===id);
  const c = getClient(a.clientId);
  draft = Object.assign({}, a, {name:c.name, phone:c.phone});
  closeSheet(); go('new');
}
function dupApt(id){
  const a = S.appointments.find(x=>x.id===id);
  const c = getClient(a.clientId);
  draft = Object.assign({}, a, {id:null, name:c.name, phone:c.phone, status:'scheduled'});
  closeSheet(); go('new'); toast('שכפול — בחרי תאריך חדש');
}
function bookNext(id){
  const a = S.appointments.find(x=>x.id===id);
  const c = getClient(a.clientId);
  const [y,m,d] = a.date.split('-').map(Number);
  const nx = new Date(y,m-1,d+21);
  draft = Object.assign({}, a, {id:null, name:c.name, phone:c.phone, date:todayISO(nx), status:'scheduled'});
  closeSheet(); go('new');
}
function delApt(id){
  sheet(`<h3>למחוק את התור?</h3><p class="sub">הפעולה לא ניתנת לביטול.</p>
    <button class="btn danger" onclick="confirmDel('${id}')">כן, מחקי</button>
    <button class="btn ghost sm" style="margin-top:9px" onclick="closeSheet()">חזרה</button>`);
}
async function confirmDel(id){
  S.appointments = S.appointments.filter(a=>a.id!==id);
  await save(); closeSheet(); render(); toast('התור נמחק');
}

function openClient(id){
  const c = getClient(id), st = clientStats(id), h = clientHistory(id);
  const labels = {scheduled:'קבוע', done:'הושלם', cancelled:'בוטל', noshow:'לא הגיעה'};
  sheet(`<h3>${esc(c.name)}</h3><p class="sub">${fmtPhone(c.phone)}</p>
    <div class="stats" style="margin-bottom:14px">
      <div class="stat"><b>${st.total}</b><span>ביקורים</span></div>
      <div class="stat"><b>${st.last?fmtShort(st.last):'—'}</b><span>ביקור אחרון</span></div>
      <div class="stat"><b>${st.spent}₪</b><span>סה״כ</span></div>
    </div>
    <button class="btn wa sm" onclick="openWA('${c.phone}','היי ${esc(c.name)} 🌸')">וואטסאפ</button>
    <button class="btn sm" style="margin-top:9px" onclick="newFor('${c.id}')">קביעת תור</button>
    <label class="fld" style="margin-top:16px"><span class="lb">הערות על הלקוחה</span>
      <textarea class="in" onchange="setClientNote('${c.id}',this.value)" 
        placeholder="העדפות, אלרגיות, צבע אהוב…">${esc(c.notes||'')}</textarea></label>
    <div class="sect" style="margin-right:0">היסטוריה</div>
    ${h.length? h.map(a=>`<div class="row">
      <div class="body"><div class="t1" style="font-size:15px">${esc(a.treatment)}</div>
        <div class="t2">${fmtDate(a.date)} · ${a.time}</div></div>
      <span class="pill ${a.status}">${labels[a.status]}</span></div>`).join('')
      : '<div style="color:var(--ink-soft);font-size:14.5px;padding:8px 2px">עדיין אין תורים.</div>'}`);
}
async function setClientNote(id,v){ getClient(id).notes = v; await save(); }
function newFor(id){
  const c = getClient(id);
  newDraft(); draft.clientId=id; draft.name=c.name; draft.phone=c.phone;
  closeSheet(); go('new');
}

function editTreat(tid){
  const t = tid ? S.treatments.find(x=>x.id===tid) : {name:'',price:'',dur:S.settings.defaultDuration};
  sheet(`<h3>${tid?'עריכת טיפול':'טיפול חדש'}</h3>
    <label class="fld"><span class="lb">שם</span><input class="in" id="t-n" value="${esc(t.name)}"></label>
    <div class="row2">
      <label class="fld"><span class="lb">מחיר (₪)</span><input class="in" id="t-p" type="number" inputmode="numeric" value="${t.price}"></label>
      <label class="fld"><span class="lb">משך (דק׳)</span><input class="in" id="t-d" type="number" inputmode="numeric" value="${t.dur}"></label>
    </div>
    <button class="btn" onclick="saveTreat('${tid||''}')">שמירה</button>
    ${tid?`<button class="btn danger sm" style="margin-top:9px" onclick="delTreat('${tid}')">מחיקה</button>`:''}`);
}
async function saveTreat(tid){
  const n = $('t-n').value.trim(); if(!n){ toast('צריך שם'); return; }
  const o = {id:tid||uid(), name:n, price:+$('t-p').value||0, dur:+$('t-d').value||60};
  if(tid) S.treatments = S.treatments.map(t=>t.id===tid?o:t); else S.treatments.push(o);
  await save(); closeSheet(); renderSettings();
}
async function delTreat(tid){
  S.treatments = S.treatments.filter(t=>t.id!==tid);
  await save(); closeSheet(); renderSettings();
}

/* ---------- הוספה ליומן הטלפון ----------
   מייצר קובץ אירוע תקני. ההתראה מגיעה מהיומן של המכשיר עצמו,
   ולכן היא קופצת גם כשהאפליקציה סגורה.                        */
function icsStamp(iso, hhmm){
  return iso.replace(/-/g,'') + 'T' + hhmm.replace(':','') + '00';
}
function icsEvent(a){
  const c = getClient(a.clientId);
  const title = (c?c.name:'תור') + ' — ' + (a.treatment||'');
  const desc = [a.price?a.price+' ₪':'', c&&c.phone?'טלפון: '+c.phone:'', a.notes||'']
    .filter(Boolean).join('\\n');
  return ['BEGIN:VEVENT',
    'UID:'+a.id+'@nailstudio',
    'DTSTAMP:'+icsStamp(todayISO(),'000000'.slice(0,5)),
    'DTSTART:'+icsStamp(a.date, a.time),
    'DTEND:'+icsStamp(a.date, addMin(a.time, +a.dur||60)),
    'SUMMARY:'+title,
    'DESCRIPTION:'+desc,
    'BEGIN:VALARM','TRIGGER:-PT60M','ACTION:DISPLAY',
    'DESCRIPTION:התור של '+(c?c.name:'')+' מתחיל בעוד שעה','END:VALARM',
    'END:VEVENT'].join('\r\n');
}
function downloadICS(events, name){
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//nailstudio//HE','CALSCALE:GREGORIAN',
    ...events,'END:VCALENDAR'].join('\r\n');
  const blob = new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name+'.ics';
  document.body.appendChild(a); a.click(); a.remove();
}
function toCalendar(id){
  const a = S.appointments.find(x=>x.id===id);
  downloadICS([icsEvent(a)], 'tor');
  closeSheet();
  toast('נפתח — אשרי הוספה ליומן');
}
function allToCalendar(){
  const t = todayISO();
  const list = S.appointments.filter(a=>a.status==='scheduled' && a.date>=t);
  if(!list.length){ toast('אין תורים עתידיים'); return; }
  downloadICS(list.map(icsEvent), 'torim');
  toast(list.length+' תורים — אשרי הוספה ליומן');
}

/* ---------- גיבוי ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'גיבוי-יומן-'+todayISO()+'.json';
  a.click();
  toast('הגיבוי ירד למכשיר');
}
function importData(){
  const i = document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try{ S = Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), JSON.parse(r.result));
        await save(); go('home'); toast('הנתונים שוחזרו'); }
      catch(err){ toast('הקובץ לא תקין'); }
    };
    r.readAsText(f);
  };
  i.click();
}

async function wipe(){
  sheet(`<h3>למחוק הכול?</h3><p class="sub">כל התורים והלקוחות יימחקו לצמיתות.</p>
    <button class="btn danger" onclick="confirmWipe()">כן, מחקי הכול</button>

}

/* ---------- טוסט ---------- */
let toastT;
function toast(msg){
  const el = $('toast'); el.textContent = msg; el.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('on'), 2100);
}
